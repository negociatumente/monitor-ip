[settings]
version = "1.0.5"
ping_attempts = "5"
ping_interval = "300"
[services-colors]
DEFAULT = "#6b7280"
[services-methods]
DEFAULT = "icmp"
[ips-services]
[ips-type]
[ips-host]
[telegram]
enabled = "false"
bot_token = ""
chat_id = ""
notify_on_up = "true"
notify_on_down = "true"
frequency = "300"
message_template = "{status_icon} IP {ip} ({service}) is {status} at {timestamp}"
[security]
enabled = "false"
username = ""
password = ""
